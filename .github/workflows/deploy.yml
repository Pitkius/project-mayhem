name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            echo "[deploy] connected as $(whoami)"
            test -d /home/fivem/server
            cd /home/fivem/server
            git status --short
            git fetch origin main
            git pull --ff-only origin main
            systemctl restart fivem-txadmin
            systemctl is-active --quiet fivem-txadmin
            echo "[deploy] done"
