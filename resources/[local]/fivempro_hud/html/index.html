<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fivempro HUD</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="hud" class="hud">
        <div class="bar">
            <div class="label">CASH</div>
            <div class="money" id="cash">$0</div>
        </div>
        <div class="bar">
            <div class="label">BANK</div>
            <div class="money" id="bank">$0</div>
        </div>
        <div class="bar">
            <div class="label">HP</div>
            <div class="track"><div id="health" class="fill health"></div></div>
        </div>
        <div id="armor-row" class="bar hidden">
            <div class="label">AR</div>
            <div class="track"><div id="armor" class="fill armor"></div></div>
        </div>
        <div class="bar">
            <div class="label">FOOD</div>
            <div class="track"><div id="hunger" class="fill hunger"></div></div>
        </div>
        <div class="bar">
            <div class="label">WATER</div>
            <div class="track"><div id="thirst" class="fill thirst"></div></div>
        </div>
    </div>
    <div id="carhud" class="carhud hidden">
        <div class="carline"><span>KM/H</span><strong id="speed">0</strong></div>
        <div class="carline"><span>FUEL</span><strong id="fuel">0%</strong></div>
        <div class="carline"><span>ENGINE</span><strong id="engine">0%</strong></div>
        <div class="carline"><span>BELT</span><strong id="seatbelt">OFF</strong></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
