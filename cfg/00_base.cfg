# ----------------------------------------
# Base server settings
# ----------------------------------------

sv_hostname "FIVEMPROJEKTAS DEV"
sv_maxclients 8
sets sv_projectName "FIVEMPROJEKTAS"
sets sv_projectDesc "QBCore local dev server"
sets locale "lt-LT"

# RCON (optional local)
rcon_password "change_me"

# Network
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# License key (set your own value on server)
sv_licenseKey "YOUR_CFX_LICENSE_KEY"

# Optional APIs
set steam_webApiKey "none"

# Database (oxmysql) - replace with your server credentials
set mysql_connection_string "mysql://USER:PASSWORD@127.0.0.1/fivempro?charset=utf8mb4"

# OneSync must be configured in txAdmin UI
# set onesync on

# Recommended build
set sv_enforceGameBuild 3095

# Basic admin principal example
add_principal identifier.fivem:1 group.admin
add_ace group.admin command allow
add_ace group.admin command.quit deny
